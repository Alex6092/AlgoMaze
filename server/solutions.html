<!doctype html>
<html lang="fr">
<head>
    <title>Solutions — AlgoMaze</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/auth.js"></script>
    <script src="/js/app-shell.js"></script>
</head>

<body>

    <main class="app-main">
        <h1 class="page-title">Solutions des étudiants</h1>
        <p class="page-subtitle">Consulte le code soumis et l'évaluation IA, par étudiant ou par niveau.</p>

        <div class="solutions-controls">
            <div class="control-group">
                <span class="label">Mode :</span>
                <label><input type="radio" name="mode" value="user" checked> Par utilisateur</label>
                <label><input type="radio" name="mode" value="level"> Par niveau</label>
            </div>

            <div class="control-group" style="flex: 1; min-width: 240px;">
                <label class="label" for="target-select">Cible</label>
                <select id="target-select"></select>
            </div>

            <button class="btn btn-primary" id="load-button">Charger</button>
        </div>

        <div id="results-container"></div>
    </main>

    <!-- Modale de comparaison côte à côte (diff) -->
    <div class="modal-overlay" id="diff-modal" role="dialog" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="diff-title">Comparaison</h3>
                <button class="modal-close" id="diff-close" type="button" aria-label="Fermer">×</button>
            </div>
            <div class="modal-body">
                <div class="diff-grid">
                    <div class="diff-side">
                        <h4 id="diff-label-a">A</h4>
                        <pre class="diff-pre" id="diff-pre-a"></pre>
                    </div>
                    <div class="diff-side">
                        <h4 id="diff-label-b">B</h4>
                        <pre class="diff-pre" id="diff-pre-b"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script>
        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = 'notification ' + type;
            n.innerText = message;
            container.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatDate(ts) {
            try { return new Date(ts).toLocaleString('fr-FR'); }
            catch (e) { return String(ts); }
        }

        async function fetchUsers() {
            const token = localStorage.getItem('token');
            const response = await fetch('/userprogressreport', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des utilisateurs');
            return await response.json();
        }

        async function fetchLevels() {
            const token = localStorage.getItem('token');
            const response = await fetch('/levels', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des niveaux');
            return await response.json();
        }

        async function populateTargetSelect(mode) {
            const select = document.getElementById('target-select');
            select.innerHTML = '';
            try {
                if (mode === 'user') {
                    const users = await fetchUsers();
                    users.forEach(u => {
                        const opt = document.createElement('option');
                        opt.value = u.username;
                        opt.textContent = `${u.username} (niveau ${u.lastCompletedLevel})`;
                        select.appendChild(opt);
                    });
                } else {
                    const levels = await fetchLevels();
                    levels.forEach(l => {
                        const opt = document.createElement('option');
                        opt.value = l;
                        opt.textContent = `Niveau ${l}`;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        function regenButtonHtml(username, levelId) {
            if (!username || levelId == null) return '';
            return `<button class="btn btn-secondary btn-sm regen-btn"
                            data-regen-user="${escapeHtml(username)}"
                            data-regen-level="${escapeHtml(levelId)}"
                            type="button"
                            title="Regénérer l'évaluation IA pour cette solution"
                            style="margin-left:auto;">🔄 Regénérer</button>`;
        }

        function renderFeedback(status, result, username, levelId) {
            if (!status) return '';
            if (status === 'pending') {
                return '<div class="feedback-block pending"><div class="fb-header"><span class="fb-badge pending">Évaluation IA en cours…</span></div></div>';
            }
            if (status === 'error') {
                const msg = (result && result.error) || 'Erreur inconnue';
                return '<div class="feedback-block error">'
                    + '<div class="fb-header"><b>Évaluation IA en échec :</b> ' + escapeHtml(msg) + regenButtonHtml(username, levelId) + '</div>'
                    + '</div>';
            }
            const score = (result && typeof result.score === 'number') ? result.score : '?';
            const respected = result && result.constraintsRespected;
            const txt = (result && result.feedback) || '';
            const criteria = (result && Array.isArray(result.criteria)) ? result.criteria : [];
            const badgeName = result && result.badge;
            const jump = result && result.qualityJump;
            let html = '<div class="feedback-block">';
            html += '<div class="fb-header">';
            html += '<span class="fb-score">' + escapeHtml(score) + '/100</span>';
            if (badgeName) {
                html += '<span class="badge ' + escapeHtml(badgeName) + '">' + escapeHtml(badgeName) + '</span>';
            }
            html += '<span class="fb-badge ' + (respected ? 'ok' : 'ko') + '">'
                 + (respected ? 'Contraintes respectées' : 'Contraintes non respectées') + '</span>';
            if (jump && jump.jump) {
                html += '<span class="quality-jump-flag" title="Score nettement supérieur à la médiane de l\'élève (' + jump.baselineMedian + ' XP) — à examiner.">⚠️ Saut de qualité +' + jump.delta + ' XP</span>';
            }
            html += regenButtonHtml(username, levelId);
            html += '</div>';
            html += '<div class="fb-text">' + escapeHtml(txt) + '</div>';
            if (criteria.length) {
                html += '<details><summary>Critères (' + criteria.length + ')</summary>';
                criteria.forEach(c => {
                    html += '<div class="fb-criterion ' + (c.met ? 'met' : 'unmet') + '">';
                    html += '<b>' + (c.met ? '✓ ' : '✗ ') + escapeHtml(c.name) + '</b> — ' + escapeHtml(c.comment);
                    html += '</div>';
                });
                html += '</details>';
            }
            html += '</div>';
            return html;
        }

        // Bloc "Signaux" (anti-triche) — chaque signal anormal est mis en évidence.
        function renderSignals(signals, analysis) {
            if (!signals) return '';
            const fmt = v => Number(v || 0).toLocaleString('fr-FR');
            const f = (analysis && analysis.flags) || {};
            const cls = key => f[key] ? 'suspect' : '';
            const count = (analysis && analysis.suspectCount) || 0;

            let summary = '';
            if (count === 0) {
                summary = '<span class="signals-summary clean">✓ Aucun signal suspect</span>';
            } else if (count === 1) {
                summary = '<span class="signals-summary warn">⚠️ 1 signal suspect</span>';
            } else {
                summary = '<span class="signals-summary alert">⚠️ ' + count + ' signaux suspects</span>';
            }
            const pasteRatioPct = analysis ? Math.round((analysis.pasteRatio || 0) * 100) : 0;

            return `
                <div class="signals-block">
                    <h4>Signaux de session ${summary}</h4>
                    <div class="signals-grid">
                        <div class="${cls('away')}"><span class="label">Onglet caché :</span> <b>${fmt(signals.tabSwitchCount)}×</b> (${fmt(signals.awaySeconds)}s)</div>
                        <div class="${cls('focus')}"><span class="label">Perte de focus :</span> <b>${fmt(signals.focusLossCount)}×</b> (${fmt(signals.focusLossSeconds)}s)</div>
                        <div class="${cls('capture')}"><span class="label">Capture suspectée :</span> <b>${fmt(signals.printScreenCount)}×</b></div>
                        <div class="${cls('imagePaste')}"><span class="label">Image collée :</span> <b>${fmt(signals.imagePasteCount)}×</b></div>
                        <div class="${cls('paste')}"><span class="label">Coller :</span> <b>${fmt(signals.pasteCount)}×</b> (${fmt(signals.pasteChars)} car., ratio ${pasteRatioPct}%)</div>
                        <div><span class="label">Durée session :</span> <b>${fmt(signals.sessionSeconds)}s</b></div>
                    </div>
                </div>
            `;
        }

        function renderHistory(history) {
            if (!history || !history.length) {
                return '<p class="muted" style="margin:6px 0;">Aucun historique</p>';
            }
            return history.map(h => `
                <div class="history-entry ${h.valid ? 'valid' : 'invalid'}">
                    <div class="history-meta">
                        ${formatDate(h.timestamp)} —
                        ${h.runType === 'check' ? 'validation' : 'exécution'} —
                        ${h.valid ? '✓ valide' : '✗ invalide'}
                    </div>
                    <pre>${escapeHtml(h.code)}</pre>
                </div>
            `).join('');
        }

        function renderUserSolutions(data, targetUsername) {
            if (!data.length) {
                return '<div class="empty-state">Aucune solution enregistrée pour cet utilisateur.</div>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>Niveau ${entry.levelId}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult, targetUsername, entry.levelId)}
                    ${renderSignals(entry.sessionSignals, entry.signalsAnalysis)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        function renderLevelSolutions(data, targetLevelId) {
            if (!data.length) {
                return '<div class="empty-state">Aucune solution enregistrée pour ce niveau.</div>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>${escapeHtml(entry.username)}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult, entry.username, targetLevelId)}
                    ${renderSignals(entry.sessionSignals, entry.signalsAnalysis)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        function renderSimilarityPanel(analysis) {
            if (!analysis || analysis.sampleSize < 2) {
                return '';
            }
            const baselinePct = Math.round((analysis.baseline || 0) * 100);
            const cutoffPct = Math.round((analysis.cutoff || 0) * 100);
            const pairs = analysis.suspectPairs || [];
            let inner;
            if (!pairs.length) {
                inner = '<div class="muted" style="font-size:0.9rem;">Aucune paire suspecte détectée pour ce niveau.</div>';
            } else {
                inner = pairs.map((p, idx) => `
                    <div class="similarity-pair" data-pair-idx="${idx}" title="Cliquer pour comparer les deux solutions">
                        <span class="pair-users">${escapeHtml(p.userA)} ↔ ${escapeHtml(p.userB)}</span>
                        <span class="pair-hint">cliquer pour comparer →</span>
                        <span class="pair-score">${Math.round(p.similarity * 100)}%</span>
                    </div>
                `).join('');
            }
            const graphPanel = pairs.length >= 2
                ? `<details class="constellation" open>
                       <summary>🪐 Constellation des liens (${pairs.length} paire${pairs.length > 1 ? 's' : ''})</summary>
                       <svg class="constellation-svg" id="constellation-svg" viewBox="0 0 800 420" preserveAspectRatio="xMidYMid meet"></svg>
                   </details>`
                : '';
            return `
                <div class="similarity-panel" id="similarity-panel">
                    <h3>🔍 Analyse de similarité</h3>
                    <div class="baseline-info">
                        ${analysis.sampleSize} solution${analysis.sampleSize > 1 ? 's' : ''} comparée${analysis.sampleSize > 1 ? 's' : ''}.
                        Similarité moyenne du niveau : <b>${baselinePct}%</b> · Seuil de signalement : <b>${cutoffPct}%</b>.
                    </div>
                    ${inner}
                    ${graphPanel}
                </div>
            `;
        }

        // ----- Constellation graph (force-directed, SVG vanilla) -----
        function renderConstellation(svgEl, pairs) {
            if (!svgEl || !pairs || !pairs.length) return;
            const W = 800, H = 420;

            // 1. Construire la liste des nœuds uniques.
            const nodeMap = new Map();
            pairs.forEach(p => {
                if (!nodeMap.has(p.userA)) nodeMap.set(p.userA, { id: p.userA, degree: 0 });
                if (!nodeMap.has(p.userB)) nodeMap.set(p.userB, { id: p.userB, degree: 0 });
                nodeMap.get(p.userA).degree++;
                nodeMap.get(p.userB).degree++;
            });
            const nodes = Array.from(nodeMap.values());
            const edges = pairs.map(p => ({
                source: nodeMap.get(p.userA),
                target: nodeMap.get(p.userB),
                weight: p.similarity
            }));

            // 2. Init positions aléatoires (mais déterministes par username pour stabilité visuelle).
            const seedRand = (s) => {
                let h = 2166136261 >>> 0;
                for (let i = 0; i < s.length; i++) { h = Math.imul(h ^ s.charCodeAt(i), 16777619); }
                return ((h >>> 0) % 10000) / 10000;
            };
            nodes.forEach(n => {
                n.x = 60 + seedRand(n.id) * (W - 120);
                n.y = 60 + seedRand(n.id + 'y') * (H - 120);
                n.vx = 0; n.vy = 0;
            });

            // 3. Force-directed (Fruchterman-Reingold simplifié).
            const k = Math.sqrt((W * H) / Math.max(1, nodes.length)) * 0.6;
            const ITER = 200;
            for (let it = 0; it < ITER; it++) {
                const t = 1 - it / ITER; // refroidissement
                // Reset
                nodes.forEach(n => { n.fx = 0; n.fy = 0; });
                // Répulsion
                for (let a = 0; a < nodes.length; a++) {
                    for (let b = a + 1; b < nodes.length; b++) {
                        let dx = nodes[a].x - nodes[b].x;
                        let dy = nodes[a].y - nodes[b].y;
                        let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
                        const f = (k * k) / d;
                        nodes[a].fx += (dx / d) * f;
                        nodes[a].fy += (dy / d) * f;
                        nodes[b].fx -= (dx / d) * f;
                        nodes[b].fy -= (dy / d) * f;
                    }
                }
                // Attraction (plus le lien est fort, plus on tire)
                edges.forEach(e => {
                    let dx = e.source.x - e.target.x;
                    let dy = e.source.y - e.target.y;
                    let d = Math.sqrt(dx * dx + dy * dy) || 0.01;
                    const f = (d * d / k) * (0.5 + e.weight);
                    e.source.fx -= (dx / d) * f;
                    e.source.fy -= (dy / d) * f;
                    e.target.fx += (dx / d) * f;
                    e.target.fy += (dy / d) * f;
                });
                // Application avec amortissement et limites
                nodes.forEach(n => {
                    const disp = Math.sqrt(n.fx * n.fx + n.fy * n.fy) || 0.01;
                    const limit = Math.min(disp, 12) * t;
                    n.x += (n.fx / disp) * limit;
                    n.y += (n.fy / disp) * limit;
                    n.x = Math.max(40, Math.min(W - 40, n.x));
                    n.y = Math.max(40, Math.min(H - 40, n.y));
                });
            }

            // 4. Rendu SVG.
            const svgNS = 'http://www.w3.org/2000/svg';
            svgEl.innerHTML = '';

            // Edges en premier (sous les nodes)
            edges.forEach((e, idx) => {
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', e.source.x);
                line.setAttribute('y1', e.source.y);
                line.setAttribute('x2', e.target.x);
                line.setAttribute('y2', e.target.y);
                line.setAttribute('stroke-width', 1 + e.weight * 4);
                line.setAttribute('stroke-opacity', 0.4 + e.weight * 0.5);
                line.setAttribute('class', 'edge');
                line.setAttribute('data-pair-idx', idx);
                line.setAttribute('aria-label',
                    e.source.id + ' ↔ ' + e.target.id + ' : ' + Math.round(e.weight * 100) + '%');
                svgEl.appendChild(line);

                // Label de pourcentage au milieu
                const lbl = document.createElementNS(svgNS, 'text');
                lbl.setAttribute('x', (e.source.x + e.target.x) / 2);
                lbl.setAttribute('y', (e.source.y + e.target.y) / 2 - 4);
                lbl.setAttribute('text-anchor', 'middle');
                lbl.setAttribute('class', 'edge-label');
                lbl.textContent = Math.round(e.weight * 100) + '%';
                svgEl.appendChild(lbl);
            });

            // Nodes
            nodes.forEach(n => {
                const r = 18 + Math.min(n.degree * 2, 12);
                const circle = document.createElementNS(svgNS, 'circle');
                circle.setAttribute('cx', n.x);
                circle.setAttribute('cy', n.y);
                circle.setAttribute('r', r);
                circle.setAttribute('class', 'node');
                svgEl.appendChild(circle);

                const text = document.createElementNS(svgNS, 'text');
                text.setAttribute('x', n.x);
                text.setAttribute('y', n.y + 4);
                text.setAttribute('class', 'node-label');
                text.textContent = n.id.length > 10 ? (n.id.slice(0, 9) + '…') : n.id;
                svgEl.appendChild(text);
            });
        }

        // ----- Diff LCS ligne à ligne -----
        function lineDiff(a, b) {
            const aLines = (a || '').split('\n');
            const bLines = (b || '').split('\n');
            const m = aLines.length, n = bLines.length;
            // Table LCS
            const lcs = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (aLines[i - 1] === bLines[j - 1]) {
                        lcs[i][j] = lcs[i - 1][j - 1] + 1;
                    } else {
                        lcs[i][j] = Math.max(lcs[i - 1][j], lcs[i][j - 1]);
                    }
                }
            }
            // Backtrack
            const ops = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && aLines[i - 1] === bLines[j - 1]) {
                    ops.unshift({ type: 'equal', a: aLines[i - 1], b: bLines[j - 1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || lcs[i][j - 1] >= lcs[i - 1][j])) {
                    ops.unshift({ type: 'add', b: bLines[j - 1] });
                    j--;
                } else {
                    ops.unshift({ type: 'remove', a: aLines[i - 1] });
                    i--;
                }
            }
            return ops;
        }

        // Convertit la liste d'opérations en deux colonnes alignées (lignes vides
        // côté A pour les ajouts, vides côté B pour les retraits).
        function renderDiffSides(ops) {
            const left = [];
            const right = [];
            const renderLine = (cls, gutter, content) =>
                `<span class="diff-line ${cls}"><span class="gutter">${gutter}</span>${escapeHtml(content)}</span>`;
            ops.forEach(op => {
                if (op.type === 'equal') {
                    left.push(renderLine('equal', ' ', op.a));
                    right.push(renderLine('equal', ' ', op.b));
                } else if (op.type === 'add') {
                    left.push(renderLine('empty', ' ', ''));
                    right.push(renderLine('add', '+', op.b));
                } else if (op.type === 'remove') {
                    left.push(renderLine('remove', '−', op.a));
                    right.push(renderLine('empty', ' ', ''));
                }
            });
            return { left: left.join(''), right: right.join('') };
        }

        // ----- Modale de comparaison -----
        let _solutionsByUser = {}; // { username -> code } pour le niveau courant
        let _currentLevelLabel = '';
        let _currentSuspectPairs = [];

        function openDiffModal(userA, userB, similarity) {
            const codeA = _solutionsByUser[userA] || '';
            const codeB = _solutionsByUser[userB] || '';
            const ops = lineDiff(codeA, codeB);
            const sides = renderDiffSides(ops);

            document.getElementById('diff-title').textContent =
                `Comparaison : ${userA} ↔ ${userB}` +
                (similarity != null ? `  ·  similarité ${Math.round(similarity * 100)}%` : '') +
                (_currentLevelLabel ? `  (${_currentLevelLabel})` : '');
            document.getElementById('diff-label-a').textContent = userA;
            document.getElementById('diff-label-b').textContent = userB;
            document.getElementById('diff-pre-a').innerHTML = sides.left;
            document.getElementById('diff-pre-b').innerHTML = sides.right;

            const modal = document.getElementById('diff-modal');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeDiffModal() {
            const modal = document.getElementById('diff-modal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        // Délégation de clic pour la liste des paires + le graph.
        function bindSimilarityClicks(panelEl) {
            if (!panelEl) return;
            panelEl.addEventListener('click', (e) => {
                const target = e.target.closest('[data-pair-idx]');
                if (!target) return;
                const idx = parseInt(target.getAttribute('data-pair-idx'), 10);
                const pair = _currentSuspectPairs[idx];
                if (pair) openDiffModal(pair.userA, pair.userB, pair.similarity);
            });
        }

        async function fetchSimilarity(levelId) {
            const token = localStorage.getItem('token');
            try {
                const r = await fetch(`/admin/similarity/level/${encodeURIComponent(levelId)}`, {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!r.ok) return null;
                return await r.json();
            } catch (e) { return null; }
        }

        async function loadSolutions() {
            const token = localStorage.getItem('token');
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const target = document.getElementById('target-select').value;
            const container = document.getElementById('results-container');

            if (!target) {
                showNotification('Sélectionne une cible', 'error');
                return;
            }

            container.innerHTML = '<div class="empty-state">Chargement…</div>';
            try {
                const url = mode === 'user'
                    ? `/admin/solutions/user/${encodeURIComponent(target)}`
                    : `/admin/solutions/level/${encodeURIComponent(target)}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Erreur ' + response.status);
                const data = await response.json();

                // En mode niveau : on ajoute en tête le panneau d'analyse de similarité,
                // et on cache les codes pour la popup de comparaison.
                let header = '';
                let simAnalysis = null;
                if (mode === 'level') {
                    _solutionsByUser = {};
                    data.forEach(entry => { _solutionsByUser[entry.username] = entry.code || ''; });
                    _currentLevelLabel = 'Niveau ' + target;
                    simAnalysis = await fetchSimilarity(target);
                    _currentSuspectPairs = (simAnalysis && simAnalysis.suspectPairs) || [];
                    header = renderSimilarityPanel(simAnalysis);
                } else {
                    _solutionsByUser = {};
                    _currentSuspectPairs = [];
                    _currentLevelLabel = '';
                }

                container.innerHTML = header + (mode === 'user' ? renderUserSolutions(data, target) : renderLevelSolutions(data, target));

                // Une fois le panneau monté, on dessine la constellation et on branche les clics.
                if (mode === 'level' && simAnalysis) {
                    const panel = document.getElementById('similarity-panel');
                    const svg = document.getElementById('constellation-svg');
                    bindSimilarityClicks(panel);
                    if (svg) renderConstellation(svg, _currentSuspectPairs);
                }
            } catch (err) {
                container.innerHTML = '';
                showNotification('Erreur lors du chargement : ' + err.message, 'error');
            }
        }

        // Délégation : clic sur n'importe quel bouton "Regénérer" dans le container
        // déclenche un POST /admin/regenerate-feedback puis recharge la vue.
        async function handleRegenClick(btn) {
            const username = btn.getAttribute('data-regen-user');
            const levelId = btn.getAttribute('data-regen-level');
            if (!username || !levelId) return;
            const token = localStorage.getItem('token');
            btn.disabled = true;
            btn.textContent = '… enfilé';
            try {
                const r = await fetch(`/admin/regenerate-feedback/${encodeURIComponent(username)}/${encodeURIComponent(levelId)}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                const data = await r.json().catch(() => ({}));
                if (!r.ok) {
                    throw new Error(data.error || 'Erreur ' + r.status);
                }
                showNotification('Évaluation enfilée pour ' + username + ' · niveau ' + levelId, 'success');
                // Recharge la vue pour afficher le statut "pending".
                await loadSolutions();
            } catch (err) {
                showNotification('Regénération impossible : ' + err.message, 'error');
                btn.disabled = false;
                btn.textContent = '🔄 Regénérer';
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            document.querySelectorAll('input[name="mode"]').forEach(radio => {
                radio.addEventListener('change', () => populateTargetSelect(radio.value));
            });
            document.getElementById('load-button').addEventListener('click', loadSolutions);

            // Délégation du clic sur les boutons "Regénérer" dans la liste des solutions.
            document.getElementById('results-container').addEventListener('click', (e) => {
                const btn = e.target.closest('.regen-btn');
                if (btn) {
                    e.stopPropagation();
                    handleRegenClick(btn);
                }
            });

            // Modale comparaison : fermeture par bouton, clic sur l'overlay, ou ESC.
            document.getElementById('diff-close').addEventListener('click', closeDiffModal);
            document.getElementById('diff-modal').addEventListener('click', (e) => {
                if (e.target.id === 'diff-modal') closeDiffModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeDiffModal();
            });
            await populateTargetSelect('user');
        });
    </script>
</body>
</html>

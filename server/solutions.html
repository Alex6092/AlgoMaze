<!doctype html>
<html lang="fr">
<head>
    <title>Solutions — AlgoMaze</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/auth.js"></script>
    <script src="/js/app-shell.js"></script>
</head>

<body>

    <main class="app-main">
        <h1 class="page-title">Solutions des étudiants</h1>
        <p class="page-subtitle">Consulte le code soumis et l'évaluation IA, par étudiant ou par niveau.</p>

        <div class="solutions-controls">
            <div class="control-group">
                <span class="label">Mode :</span>
                <label><input type="radio" name="mode" value="user" checked> Par utilisateur</label>
                <label><input type="radio" name="mode" value="level"> Par niveau</label>
            </div>

            <div class="control-group" style="flex: 1; min-width: 240px;">
                <label class="label" for="target-select">Cible</label>
                <select id="target-select"></select>
            </div>

            <button class="btn btn-primary" id="load-button">Charger</button>
        </div>

        <div id="results-container"></div>
    </main>

    <div id="notification-container"></div>

    <script>
        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = 'notification ' + type;
            n.innerText = message;
            container.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatDate(ts) {
            try { return new Date(ts).toLocaleString('fr-FR'); }
            catch (e) { return String(ts); }
        }

        async function fetchUsers() {
            const token = localStorage.getItem('token');
            const response = await fetch('/userprogressreport', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des utilisateurs');
            return await response.json();
        }

        async function fetchLevels() {
            const token = localStorage.getItem('token');
            const response = await fetch('/levels', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des niveaux');
            return await response.json();
        }

        async function populateTargetSelect(mode) {
            const select = document.getElementById('target-select');
            select.innerHTML = '';
            try {
                if (mode === 'user') {
                    const users = await fetchUsers();
                    users.forEach(u => {
                        const opt = document.createElement('option');
                        opt.value = u.username;
                        opt.textContent = `${u.username} (niveau ${u.lastCompletedLevel})`;
                        select.appendChild(opt);
                    });
                } else {
                    const levels = await fetchLevels();
                    levels.forEach(l => {
                        const opt = document.createElement('option');
                        opt.value = l;
                        opt.textContent = `Niveau ${l}`;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        function renderFeedback(status, result) {
            if (!status) return '';
            if (status === 'pending') {
                return '<div class="feedback-block pending"><span class="fb-badge pending">Évaluation IA en cours…</span></div>';
            }
            if (status === 'error') {
                const msg = (result && result.error) || 'Erreur inconnue';
                return '<div class="feedback-block error"><b>Évaluation IA en échec :</b> ' + escapeHtml(msg) + '</div>';
            }
            const score = (result && typeof result.score === 'number') ? result.score : '?';
            const respected = result && result.constraintsRespected;
            const txt = (result && result.feedback) || '';
            const criteria = (result && Array.isArray(result.criteria)) ? result.criteria : [];
            const badgeName = result && result.badge;
            const jump = result && result.qualityJump;
            let html = '<div class="feedback-block">';
            html += '<div class="fb-header">';
            html += '<span class="fb-score">' + escapeHtml(score) + '/100</span>';
            if (badgeName) {
                html += '<span class="badge ' + escapeHtml(badgeName) + '">' + escapeHtml(badgeName) + '</span>';
            }
            html += '<span class="fb-badge ' + (respected ? 'ok' : 'ko') + '">'
                 + (respected ? 'Contraintes respectées' : 'Contraintes non respectées') + '</span>';
            if (jump && jump.jump) {
                html += '<span class="quality-jump-flag" title="Score nettement supérieur à la médiane de l\'élève (' + jump.baselineMedian + ' XP) — à examiner.">⚠️ Saut de qualité +' + jump.delta + ' XP</span>';
            }
            html += '</div>';
            html += '<div class="fb-text">' + escapeHtml(txt) + '</div>';
            if (criteria.length) {
                html += '<details><summary>Critères (' + criteria.length + ')</summary>';
                criteria.forEach(c => {
                    html += '<div class="fb-criterion ' + (c.met ? 'met' : 'unmet') + '">';
                    html += '<b>' + (c.met ? '✓ ' : '✗ ') + escapeHtml(c.name) + '</b> — ' + escapeHtml(c.comment);
                    html += '</div>';
                });
                html += '</details>';
            }
            html += '</div>';
            return html;
        }

        // Bloc "Signaux" (anti-triche) — chaque signal anormal est mis en évidence.
        function renderSignals(signals, analysis) {
            if (!signals) return '';
            const fmt = v => Number(v || 0).toLocaleString('fr-FR');
            const f = (analysis && analysis.flags) || {};
            const cls = key => f[key] ? 'suspect' : '';
            const count = (analysis && analysis.suspectCount) || 0;

            let summary = '';
            if (count === 0) {
                summary = '<span class="signals-summary clean">✓ Aucun signal suspect</span>';
            } else if (count === 1) {
                summary = '<span class="signals-summary warn">⚠️ 1 signal suspect</span>';
            } else {
                summary = '<span class="signals-summary alert">⚠️ ' + count + ' signaux suspects</span>';
            }
            const pasteRatioPct = analysis ? Math.round((analysis.pasteRatio || 0) * 100) : 0;

            return `
                <div class="signals-block">
                    <h4>Signaux de session ${summary}</h4>
                    <div class="signals-grid">
                        <div class="${cls('away')}"><span class="label">Onglet caché :</span> <b>${fmt(signals.tabSwitchCount)}×</b> (${fmt(signals.awaySeconds)}s)</div>
                        <div class="${cls('focus')}"><span class="label">Perte de focus :</span> <b>${fmt(signals.focusLossCount)}×</b> (${fmt(signals.focusLossSeconds)}s)</div>
                        <div class="${cls('capture')}"><span class="label">Capture suspectée :</span> <b>${fmt(signals.printScreenCount)}×</b></div>
                        <div class="${cls('imagePaste')}"><span class="label">Image collée :</span> <b>${fmt(signals.imagePasteCount)}×</b></div>
                        <div class="${cls('paste')}"><span class="label">Coller :</span> <b>${fmt(signals.pasteCount)}×</b> (${fmt(signals.pasteChars)} car., ratio ${pasteRatioPct}%)</div>
                        <div><span class="label">Durée session :</span> <b>${fmt(signals.sessionSeconds)}s</b></div>
                    </div>
                </div>
            `;
        }

        function renderHistory(history) {
            if (!history || !history.length) {
                return '<p class="muted" style="margin:6px 0;">Aucun historique</p>';
            }
            return history.map(h => `
                <div class="history-entry ${h.valid ? 'valid' : 'invalid'}">
                    <div class="history-meta">
                        ${formatDate(h.timestamp)} —
                        ${h.runType === 'check' ? 'validation' : 'exécution'} —
                        ${h.valid ? '✓ valide' : '✗ invalide'}
                    </div>
                    <pre>${escapeHtml(h.code)}</pre>
                </div>
            `).join('');
        }

        function renderUserSolutions(data) {
            if (!data.length) {
                return '<div class="empty-state">Aucune solution enregistrée pour cet utilisateur.</div>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>Niveau ${entry.levelId}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult)}
                    ${renderSignals(entry.sessionSignals, entry.signalsAnalysis)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        function renderLevelSolutions(data) {
            if (!data.length) {
                return '<div class="empty-state">Aucune solution enregistrée pour ce niveau.</div>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>${escapeHtml(entry.username)}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult)}
                    ${renderSignals(entry.sessionSignals, entry.signalsAnalysis)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        function renderSimilarityPanel(analysis) {
            if (!analysis || analysis.sampleSize < 2) {
                return '';
            }
            const baselinePct = Math.round((analysis.baseline || 0) * 100);
            const cutoffPct = Math.round((analysis.cutoff || 0) * 100);
            const pairs = analysis.suspectPairs || [];
            let inner;
            if (!pairs.length) {
                inner = '<div class="muted" style="font-size:0.9rem;">Aucune paire suspecte détectée pour ce niveau.</div>';
            } else {
                inner = pairs.map(p => `
                    <div class="similarity-pair">
                        <span class="pair-users">${escapeHtml(p.userA)} ↔ ${escapeHtml(p.userB)}</span>
                        <span class="pair-score">${Math.round(p.similarity * 100)}%</span>
                    </div>
                `).join('');
            }
            return `
                <div class="similarity-panel">
                    <h3>🔍 Analyse de similarité</h3>
                    <div class="baseline-info">
                        ${analysis.sampleSize} solution${analysis.sampleSize > 1 ? 's' : ''} comparée${analysis.sampleSize > 1 ? 's' : ''}.
                        Similarité moyenne du niveau : <b>${baselinePct}%</b> · Seuil de signalement : <b>${cutoffPct}%</b>.
                    </div>
                    ${inner}
                </div>
            `;
        }

        async function fetchSimilarity(levelId) {
            const token = localStorage.getItem('token');
            try {
                const r = await fetch(`/admin/similarity/level/${encodeURIComponent(levelId)}`, {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!r.ok) return null;
                return await r.json();
            } catch (e) { return null; }
        }

        async function loadSolutions() {
            const token = localStorage.getItem('token');
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const target = document.getElementById('target-select').value;
            const container = document.getElementById('results-container');

            if (!target) {
                showNotification('Sélectionne une cible', 'error');
                return;
            }

            container.innerHTML = '<div class="empty-state">Chargement…</div>';
            try {
                const url = mode === 'user'
                    ? `/admin/solutions/user/${encodeURIComponent(target)}`
                    : `/admin/solutions/level/${encodeURIComponent(target)}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Erreur ' + response.status);
                const data = await response.json();

                // En mode niveau : on ajoute en tête le panneau d'analyse de similarité.
                let header = '';
                if (mode === 'level') {
                    const sim = await fetchSimilarity(target);
                    header = renderSimilarityPanel(sim);
                }

                container.innerHTML = header + (mode === 'user' ? renderUserSolutions(data) : renderLevelSolutions(data));
            } catch (err) {
                container.innerHTML = '';
                showNotification('Erreur lors du chargement : ' + err.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            document.querySelectorAll('input[name="mode"]').forEach(radio => {
                radio.addEventListener('change', () => populateTargetSelect(radio.value));
            });
            document.getElementById('load-button').addEventListener('click', loadSolutions);
            await populateTargetSelect('user');
        });
    </script>
</body>
</html>

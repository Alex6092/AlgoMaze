<!doctype html>
<html>
<head>
    <title>Algomaze - Solutions des étudiants</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/css/styles.css" type="text/css">
    <script src="/js/auth.js"></script>
    <style>
        .solutions-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        .solutions-controls label {
            font-weight: bold;
        }
        .solutions-controls select {
            padding: 5px 10px;
            font-size: 1em;
        }
        .solutions-controls button {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .solutions-controls button:hover {
            background: #45a049;
        }
        .solution-entry {
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            padding: 12px;
            background: #fafafa;
        }
        .solution-entry h3 {
            margin: 0 0 8px 0;
            font-size: 1.1em;
        }
        .solution-entry pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: 'Source Code Pro', 'Courier', monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            margin: 8px 0;
        }
        .solution-entry details {
            margin-top: 8px;
        }
        .solution-entry details summary {
            cursor: pointer;
            color: #555;
            user-select: none;
        }
        .history-entry {
            border-left: 3px solid #ccc;
            padding: 6px 12px;
            margin: 6px 0 6px 8px;
            background: #fff;
        }
        .history-entry.valid {
            border-left-color: #4CAF50;
        }
        .history-entry.invalid {
            border-left-color: #f44336;
        }
        .history-meta {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 4px;
        }
        .empty-state {
            color: #888;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }
        .feedback-block {
            margin-top: 8px;
            padding: 8px 12px;
            background: #fff;
            border-left: 4px solid #2196F3;
            border-radius: 3px;
        }
        .feedback-block.error { border-left-color: #f44336; }
        .feedback-block.pending { border-left-color: #ff9800; }
        .fb-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .fb-score { font-weight: bold; font-size: 1.1em; }
        .fb-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            color: white;
        }
        .fb-badge.ok { background: #4CAF50; }
        .fb-badge.ko { background: #f44336; }
        .fb-badge.pending { background: #888; }
        .fb-text { font-style: italic; color: #444; margin: 4px 0; }
        .fb-criterion {
            padding: 4px 8px;
            margin: 3px 0;
            border-left: 3px solid #ccc;
            background: #fafafa;
            font-size: 0.9em;
        }
        .fb-criterion.met { border-left-color: #4CAF50; }
        .fb-criterion.unmet { border-left-color: #f44336; }

        /* Badges (gaming-style) — copie du style de l'app */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            color: #fff;
            text-shadow: 0 1px 1px rgba(0,0,0,0.3);
            border: 2px solid rgba(0,0,0,0.15);
        }
        .badge.Fer      { background: #6b6b6b; }
        .badge.Bronze   { background: #cd7f32; }
        .badge.Argent   { background: #a8a8a8; color: #222; text-shadow: none; }
        .badge.Or       { background: #d4af37; color: #3a2a00; text-shadow: none; }
        .badge.Platine  { background: #2bbbad; }
        .top-nav {
            margin-bottom: 15px;
        }
        .top-nav a {
            margin-right: 15px;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <h1>Solutions des étudiants</h1>
    </header>

    <div class="main-wrapper">
        <div class="left-container" style="flex: 1; padding: 20px;">
            <div class="top-nav">
                <a href="/progress">← Avancement utilisateurs</a>
                <a href="/maze">← Retour au jeu</a>
            </div>

            <div class="solutions-controls">
                <label>Mode :</label>
                <label><input type="radio" name="mode" value="user" checked> Par utilisateur</label>
                <label><input type="radio" name="mode" value="level"> Par niveau</label>

                <label for="target-select">Cible :</label>
                <select id="target-select"></select>

                <button id="load-button">Charger</button>
            </div>

            <div id="results-container"></div>
        </div>

        <div id="notification-container"></div>
    </div>

    <script>
        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerText = message;
            container.appendChild(notification);
            setTimeout(() => { notification.remove(); }, 2500);
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatDate(ts) {
            try {
                return new Date(ts).toLocaleString('fr-FR');
            } catch (e) {
                return String(ts);
            }
        }

        async function fetchUsers() {
            const token = localStorage.getItem('token');
            const response = await fetch('/userprogressreport', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des utilisateurs');
            return await response.json();
        }

        async function fetchLevels() {
            const token = localStorage.getItem('token');
            const response = await fetch('/levels', {
                headers: { 'Authorization': 'Bearer ' + token },
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Impossible de récupérer la liste des niveaux');
            return await response.json();
        }

        async function populateTargetSelect(mode) {
            const select = document.getElementById('target-select');
            select.innerHTML = '';
            try {
                if (mode === 'user') {
                    const users = await fetchUsers();
                    users.forEach(u => {
                        const opt = document.createElement('option');
                        opt.value = u.username;
                        opt.textContent = `${u.username} (niveau ${u.lastCompletedLevel})`;
                        select.appendChild(opt);
                    });
                } else {
                    const levels = await fetchLevels();
                    levels.forEach(l => {
                        const opt = document.createElement('option');
                        opt.value = l;
                        opt.textContent = `Niveau ${l}`;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        function renderFeedback(status, result) {
            if (!status) return '';
            if (status === 'pending') {
                return '<div class="feedback-block pending"><span class="fb-badge pending">Évaluation IA en cours…</span></div>';
            }
            if (status === 'error') {
                const msg = (result && result.error) || 'Erreur inconnue';
                return '<div class="feedback-block error"><b>Évaluation IA en échec :</b> ' + escapeHtml(msg) + '</div>';
            }
            // done
            const score = (result && typeof result.score === 'number') ? result.score : '?';
            const respected = result && result.constraintsRespected;
            const txt = (result && result.feedback) || '';
            const criteria = (result && Array.isArray(result.criteria)) ? result.criteria : [];
            const badgeName = result && result.badge;
            let html = '<div class="feedback-block">';
            html += '<div class="fb-header">';
            html += '<span class="fb-score">' + escapeHtml(score) + '/100</span>';
            if (badgeName) {
                html += '<span class="badge ' + escapeHtml(badgeName) + '">' + escapeHtml(badgeName) + '</span>';
            }
            html += '<span class="fb-badge ' + (respected ? 'ok' : 'ko') + '">'
                 + (respected ? 'Contraintes respectées' : 'Contraintes non respectées') + '</span>';
            html += '</div>';
            html += '<div class="fb-text">' + escapeHtml(txt) + '</div>';
            if (criteria.length) {
                html += '<details><summary>Critères (' + criteria.length + ')</summary>';
                criteria.forEach(c => {
                    html += '<div class="fb-criterion ' + (c.met ? 'met' : 'unmet') + '">';
                    html += '<b>' + (c.met ? '✓ ' : '✗ ') + escapeHtml(c.name) + '</b> — ' + escapeHtml(c.comment);
                    html += '</div>';
                });
                html += '</details>';
            }
            html += '</div>';
            return html;
        }

        function renderHistory(history) {
            if (!history || !history.length) {
                return '<p class="empty-state">Aucun historique</p>';
            }
            return history.map(h => `
                <div class="history-entry ${h.valid ? 'valid' : 'invalid'}">
                    <div class="history-meta">
                        ${formatDate(h.timestamp)} —
                        ${h.runType === 'check' ? 'validation' : 'exécution'} —
                        ${h.valid ? '✓ valide' : '✗ invalide'}
                    </div>
                    <pre>${escapeHtml(h.code)}</pre>
                </div>
            `).join('');
        }

        function renderUserSolutions(data) {
            if (!data.length) {
                return '<p class="empty-state">Aucune solution enregistrée pour cet utilisateur.</p>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>Niveau ${entry.levelId}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        function renderLevelSolutions(data) {
            if (!data.length) {
                return '<p class="empty-state">Aucune solution enregistrée pour ce niveau.</p>';
            }
            return data.map(entry => `
                <div class="solution-entry">
                    <h3>${escapeHtml(entry.username)}</h3>
                    <pre>${escapeHtml(entry.code)}</pre>
                    ${renderFeedback(entry.feedbackStatus, entry.feedbackResult)}
                    <details>
                        <summary>Historique (${entry.history.length})</summary>
                        ${renderHistory(entry.history)}
                    </details>
                </div>
            `).join('');
        }

        async function loadSolutions() {
            const token = localStorage.getItem('token');
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const target = document.getElementById('target-select').value;
            const container = document.getElementById('results-container');

            if (!target) {
                showNotification('Sélectionnez une cible', 'error');
                return;
            }

            container.innerHTML = '<p class="empty-state">Chargement...</p>';
            try {
                const url = mode === 'user'
                    ? `/admin/solutions/user/${encodeURIComponent(target)}`
                    : `/admin/solutions/level/${encodeURIComponent(target)}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Erreur ' + response.status);
                const data = await response.json();
                container.innerHTML = mode === 'user' ? renderUserSolutions(data) : renderLevelSolutions(data);
            } catch (err) {
                container.innerHTML = '';
                showNotification('Erreur lors du chargement : ' + err.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            document.querySelectorAll('input[name="mode"]').forEach(radio => {
                radio.addEventListener('change', () => populateTargetSelect(radio.value));
            });
            document.getElementById('load-button').addEventListener('click', loadSolutions);

            await populateTargetSelect('user');
        });
    </script>
</body>
</html>

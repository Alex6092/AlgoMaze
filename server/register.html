<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — AlgoMaze</title>
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script>
        (function() {
            try {
                var t = localStorage.getItem('theme');
                document.documentElement.dataset.theme = (t === 'dark' || t === 'light')
                    ? t
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            } catch (e) { document.documentElement.dataset.theme = 'light'; }
        })();
    </script>
</head>
<body class="auth-shell">

    <button class="theme-toggle" id="theme-toggle" type="button" title="Basculer le thème"
            style="position:fixed;top:20px;right:20px;">🌙</button>

    <main class="auth-card">
        <div class="app-brand-icon">🧩</div>
        <h1>Créer un compte</h1>
        <p class="auth-subtitle">Rejoins AlgoMaze et commence à coder.</p>

        <form id="register-form" autocomplete="on">
            <div class="input-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
        </form>

        <div class="links">
            Déjà inscrit ? <a href="/login">Se connecter</a>
        </div>
    </main>

    <div id="notification-container"></div>

    <script>
        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = 'notification ' + type;
            n.textContent = message;
            container.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function setTheme(t) {
            document.documentElement.dataset.theme = t;
            try { localStorage.setItem('theme', t); } catch (e) {}
            document.getElementById('theme-toggle').textContent = t === 'dark' ? '☀️' : '🌙';
        }
        setTheme(document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light');
        document.getElementById('theme-toggle').addEventListener('click', () => {
            setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('register-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Création impossible');
                }
                showNotification('Compte créé ! Tu peux maintenant te connecter.', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1200);
            } catch (error) {
                showNotification('Erreur : ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>

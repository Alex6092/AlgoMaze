<!doctype html>
<html lang="fr">
<head>
    <title>Avancement — AlgoMaze</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/auth.js"></script>
    <script src="/js/app-shell.js"></script>
</head>

<body>

    <main class="app-main">
        <h1 class="page-title">Avancement des utilisateurs</h1>
        <p class="page-subtitle">Suivi de la progression et gestion des comptes étudiants.</p>

        <!-- Outils admin (rétro-évaluation IA des solutions sans feedback). -->
        <div class="card" id="admin-tools-card" style="margin-bottom: 16px; display: none;">
            <h2 class="card-title" style="margin-top:0;">Outils admin</h2>
            <div id="bulk-eval-content"></div>
        </div>

        <div class="card" style="margin-bottom: 16px;">
            <div id="userdatacontainer"></div>
        </div>
    </main>

    <div id="notification-container"></div>

    <script>
        function showNotification(message, type) {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = 'notification ' + type;
            n.innerText = message;
            container.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function updateUserPassword(username) {
            const token = localStorage.getItem('token');
            const password = document.getElementById('newPassword_' + username).value;
            if (!password) {
                showNotification('Saisis un nouveau mot de passe avant de valider.', 'error');
                return;
            }
            try {
                let response = await fetch('/user/updatepassword', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                let result = await response.json();
                if (response.ok) {
                    showNotification('Mot de passe modifié pour ' + result.user, 'success');
                    document.getElementById('newPassword_' + username).value = '';
                } else {
                    showNotification('Erreur : ' + (result.error || 'inconnue'), 'error');
                }
            } catch (error) {
                showNotification('Erreur réseau : ' + error.message, 'error');
            }
        }

        async function deleteUser(username) {
            if (!confirm("Supprimer définitivement l'utilisateur " + username + ' ?')) return;
            const token = localStorage.getItem('token');
            try {
                let response = await fetch('/user/delete', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ username }),
                    credentials: 'include'
                });
                let result = await response.json();
                if (response.ok) {
                    showNotification('Utilisateur supprimé : ' + result.user, 'success');
                    await fetchUsersProgress();
                } else {
                    showNotification('Erreur : ' + (result.error || 'inconnue'), 'error');
                }
            } catch (error) {
                showNotification('Erreur réseau : ' + error.message, 'error');
            }
        }

        async function fetchUsersProgress() {
            const token = localStorage.getItem('token');
            try {
                let response = await fetch('/userprogressreport', {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!response.ok) throw new Error('Network response was not ok');
                const usersProgress = await response.json();
                displayUsersProgress(usersProgress);
            } catch (error) {
                showNotification('Erreur lors du chargement : ' + error.message, 'error');
            }
        }

        function displayUsersProgress(usersProgress) {
            const container = document.getElementById('userdatacontainer');
            container.innerHTML = '';

            if (!usersProgress.length) {
                container.innerHTML = '<div class="empty-state">Aucun utilisateur enregistré pour le moment.</div>';
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';

            const table = document.createElement('table');
            table.className = 'data-table';

            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Utilisateur</th>
                        <th>Avancement</th>
                        <th>Rang global</th>
                        <th>Maîtrise</th>
                        <th>Nouveau mot de passe</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            usersProgress.forEach(user => {
                const tr = document.createElement('tr');
                const totalLevels = (user.mastery && user.mastery.totalLevels) || 42;
                const progressPct = (user.mastery && user.mastery.progressPct) || Math.round(((user.lastCompletedLevel || 0) / totalLevels) * 100);
                const progressCell = `
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                        <span class="player-progress" style="display:inline-flex;"><span>Niv.</span> <b>${escapeHtml(user.lastCompletedLevel)}</b><span>/${escapeHtml(totalLevels)}</span></span>
                        <span class="progress-bar" title="${escapeHtml(progressPct)}% du parcours">
                            <span class="progress-bar-fill" style="width:${escapeHtml(progressPct)}%;"></span>
                        </span>
                    </div>
                `;
                const rankCell = (user.rankSample && user.rankSample > 0)
                    ? `<span class="player-rank" title="Médiane ${escapeHtml(user.medianXp)} XP sur ${escapeHtml(user.rankSample)} niveau${user.rankSample > 1 ? 'x' : ''} (qualité récente)"><b>${escapeHtml(user.rank)}</b> · ${escapeHtml(user.medianXp)} XP</span>`
                    : `<span class="muted" style="font-size:0.85rem;">—</span>`;
                const masteryCell = user.mastery
                    ? `<span class="mastery-badge ${escapeHtml(user.mastery.color)}" title="Score : ${escapeHtml(user.mastery.score)}% (${escapeHtml(user.mastery.totalXp)} / ${escapeHtml(user.mastery.maxTotalXp)} XP)&#10;Avancement : ${escapeHtml(user.mastery.completedLevels)}/${escapeHtml(user.mastery.totalLevels)} (${escapeHtml(user.mastery.progressPct)}%)&#10;Qualité moyenne : ${escapeHtml(user.mastery.avgQualityPct)}%">${escapeHtml(user.mastery.name)}</span>`
                    : `<span class="muted" style="font-size:0.85rem;">—</span>`;
                tr.innerHTML = `
                    <td><b>${escapeHtml(user.username)}</b></td>
                    <td>${progressCell}</td>
                    <td>${rankCell}</td>
                    <td>${masteryCell}</td>
                    <td><input type="password" id="newPassword_${escapeHtml(user.username)}" placeholder="Nouveau mot de passe" autocomplete="new-password"></td>
                    <td style="text-align:right;">
                        <button class="btn btn-secondary btn-sm" onclick="updateUserPassword('${escapeHtml(user.username)}')">Modifier</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser('${escapeHtml(user.username)}')">Supprimer</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            wrapper.appendChild(table);
            container.appendChild(wrapper);
        }

        // ----- Outils admin : rétro-évaluation IA -----
        async function refreshBulkEvalCard() {
            const card = document.getElementById('admin-tools-card');
            const content = document.getElementById('bulk-eval-content');
            const token = localStorage.getItem('token');
            try {
                const r = await fetch('/admin/missing-feedbacks', {
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!r.ok) { card.style.display = 'none'; return; }
                const data = await r.json();
                if (!data.enabled) {
                    card.style.display = 'none';
                    return;
                }
                card.style.display = 'block';
                if (data.missing === 0) {
                    content.innerHTML = `
                        <p class="muted" style="margin:0;">
                            ✓ Toutes les solutions stockées (${escapeHtml(data.total)}) ont déjà reçu une évaluation IA (ou en attente dans la file).
                        </p>
                    `;
                } else {
                    content.innerHTML = `
                        <p style="margin:0 0 12px;">
                            <b>${escapeHtml(data.missing)}</b> solution${data.missing > 1 ? 's' : ''} sur ${escapeHtml(data.total)}
                            n'${data.missing > 1 ? 'ont' : 'a'} pas encore reçu d'évaluation IA.
                            Le worker traite les jobs un par un, ça peut prendre du temps si LM Studio est lent.
                        </p>
                        <button class="btn btn-primary" id="bulk-eval-button" type="button">
                            Lancer l'évaluation IA pour ${escapeHtml(data.missing)} solution${data.missing > 1 ? 's' : ''}
                        </button>
                    `;
                    document.getElementById('bulk-eval-button').addEventListener('click', launchBulkEval);
                }
            } catch (e) {
                card.style.display = 'none';
            }
        }

        async function launchBulkEval() {
            const btn = document.getElementById('bulk-eval-button');
            if (!btn) return;
            const ok = confirm(
                "Cette action va enfiler une évaluation IA pour chaque solution non évaluée.\n" +
                "Le worker les traitera une par une (peut être long). Continuer ?"
            );
            if (!ok) return;
            const token = localStorage.getItem('token');
            btn.disabled = true;
            btn.textContent = 'Enfilement en cours…';
            try {
                const r = await fetch('/admin/bulk-evaluate', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!r.ok) throw new Error('Erreur ' + r.status);
                const data = await r.json();
                showNotification(
                    data.enqueued + ' évaluation' + (data.enqueued > 1 ? 's' : '') + ' enfilée'
                    + (data.enqueued > 1 ? 's' : '')
                    + (data.invalidSkipped ? ' · ' + data.invalidSkipped + ' ignorée(s) (non fonctionnelles)' : '')
                    + (data.errors ? ' · ' + data.errors + ' erreur(s)' : ''),
                    'success'
                );
                await refreshBulkEvalCard();
            } catch (err) {
                showNotification('Erreur lors du lancement : ' + err.message, 'error');
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await fetchUsersProgress();
            await refreshBulkEvalCard();
        });
    </script>

</body>
</html>

<!doctype html>
<html lang="fr">
    <head>
        <title>AlgoMaze</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="/assets/favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/styles.css">

        <!-- CodeMirror CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">

        <script src="/js/auth.js"></script>
        <script src="/js/app-shell.js"></script>
        <script src="/js/shared.js"></script>
        <script src="/js/common.js"></script>
        <script src="/js/algomaze.js"></script>
        <!-- Socket.io client -->
        <script src="/socket.io/socket.io.js"></script>
        <!-- CodeMirror JS -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    </head>

    <body>

        <main class="app-main">
            <div class="game-layout">
                <aside class="game-sidebar">
                    <h2>Niveaux</h2>
                    <ul class="level-list" id="level-list"></ul>
                </aside>

                <section class="game-main-column">
                    <div class="game-canvas-card">
                        <canvas id="maze" width="768" height="768"></canvas>
                    </div>

                    <div id="feedback-container">
                        <h3>Feedback IA</h3>
                        <div id="feedback-content"></div>
                    </div>
                </section>

                <section class="game-side">
                    <div class="consigne-container">
                        <h2>Consignes</h2>
                        <div id="instructions"></div>
                    </div>

                    <div class="code-editor-container">
                        <h2 class="game-section-title">Éditeur JavaScript</h2>
                        <textarea id="code-editor">// Votre solution ici ...</textarea>

                        <div class="editor-actions">
                            <button class="icon-btn" id="run-button" type="button" title="Exécuter localement">
                                <img src="/assets/run.png" alt="">
                            </button>
                            <button class="icon-btn" id="submit-button" type="button" title="Vérifier la solution">
                                <img src="/assets/verify.png" alt="">
                            </button>
                            <button id="next-level-button" type="button">Niveau suivant ➡</button>
                        </div>

                        <div class="command-buttons">
                            <h2>Saisie rapide</h2>
                            <div class="command-pills">
                                <button type="button" onclick="insertCommand('moveForward();')">moveForward()</button>
                                <button type="button" onclick="insertCommand('turnLeft();')">turnLeft()</button>
                                <button type="button" onclick="insertCommand('toggleSwitch();')">toggleSwitch()</button>
                                <button type="button" onclick="insertCommand('collectGem();')">collectGem()</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <div id="notification-container"></div>

        <script>
            let editor;

            function showNotification(message, type) {
                const notificationContainer = document.getElementById('notification-container');
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.innerText = message;
                notificationContainer.appendChild(notification);
                setTimeout(() => notification.remove(), 3000);
            }

            function insertCommand(command) {
                if (!editor) return;
                var doc = editor.getDoc();
                var cursor = doc.getCursor();
                doc.replaceRange(command + '\n', cursor);
            }

            function highlightCurrentLevel(levelId) {
                document.querySelectorAll('.level-list li').forEach(item => item.classList.remove('highlight'));
                const currentLevelItem = document.querySelector(`.level-list li[data-level-id='${levelId}']`);
                if (currentLevelItem) {
                    currentLevelItem.classList.add('highlight');
                    const levelList = document.getElementById('level-list');
                    if (levelList.scrollHeight > levelList.clientHeight) {
                        currentLevelItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }

            var currentLevelId = 1;
            var playerLastCompletedLevel = 0;

            // Anti-spam : verrouille les boutons run+submit pendant une requête en cours.
            function setActionButtonsDisabled(disabled) {
                ['run-button', 'submit-button'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.toggle('disabled', disabled);
                });
            }

            function escapeHtml(s) {
                return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // Affiche un feedback IA pour le niveau courant.
            // status : 'pending' | 'done' | 'error' | null
            function displayFeedback(status, result) {
                const container = document.getElementById('feedback-container');
                const content = document.getElementById('feedback-content');
                if (!status) {
                    container.classList.remove('visible');
                    content.innerHTML = '';
                    return;
                }
                container.classList.add('visible');

                if (status === 'pending') {
                    content.innerHTML = '<div class="feedback-header"><span class="feedback-badge pending">Évaluation IA en cours…</span></div>';
                    return;
                }
                if (status === 'error') {
                    const msg = (result && result.error) || 'Erreur inconnue';
                    content.innerHTML = '<div class="feedback-error">L\'évaluation IA a échoué : ' + escapeHtml(msg) + '</div>';
                    return;
                }
                const score = (result && typeof result.score === 'number') ? result.score : '?';
                const respected = result && result.constraintsRespected;
                const feedbackText = (result && result.feedback) || '';
                const criteria = (result && Array.isArray(result.criteria)) ? result.criteria : [];
                const badgeName = result && result.badge;

                let html = '<div class="feedback-header">';
                html += '<span class="feedback-score">' + escapeHtml(score) + '/100</span>';
                if (badgeName) {
                    html += '<span class="badge ' + escapeHtml(badgeName) + '">' + escapeHtml(badgeName) + '</span>';
                }
                html += '<span class="feedback-badge ' + (respected ? 'ok' : 'ko') + '">'
                     + (respected ? 'Contraintes respectées' : 'Contraintes non respectées') + '</span>';
                html += '</div>';
                html += '<div class="feedback-text">' + escapeHtml(feedbackText) + '</div>';
                if (criteria.length) {
                    html += '<details class="feedback-criteria"><summary>Détail des critères (' + criteria.length + ')</summary>';
                    criteria.forEach(c => {
                        html += '<div class="feedback-criterion ' + (c.met ? 'met' : 'unmet') + '">';
                        html += '<div class="feedback-criterion-name">' + (c.met ? '✓ ' : '✗ ') + escapeHtml(c.name) + '</div>';
                        html += '<div>' + escapeHtml(c.comment) + '</div>';
                        html += '</div>';
                    });
                    html += '</details>';
                }
                content.innerHTML = html;
            }

            async function fetchFeedback(levelId) {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch('/feedback/' + levelId, {
                        headers: { 'Authorization': 'Bearer ' + token },
                        credentials: 'include'
                    });
                    if (!response.ok) return null;
                    return await response.json();
                } catch (err) { return null; }
            }

            document.addEventListener("DOMContentLoaded", async function() {
                const token = localStorage.getItem('token');
                editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
                    lineNumbers: true,
                    mode: "javascript",
                    theme: "default"
                });

                // Connexion socket.io pour recevoir les feedbacks IA en push.
                const socket = io({ auth: { token } });
                socket.on('feedback:ready', (payload) => {
                    if (payload.levelId === currentLevelId) {
                        displayFeedback('done', payload.result);
                    } else {
                        showNotification('Feedback IA prêt pour le niveau ' + payload.levelId, 'success');
                    }
                    // Met à jour le rang dans le header (géré par l'app shell).
                    if (window.AppShell) window.AppShell.refreshRank();
                });
                socket.on('feedback:error', (payload) => {
                    if (payload.levelId === currentLevelId) {
                        displayFeedback('error', { error: payload.error });
                    } else {
                        showNotification('Évaluation IA en échec pour le niveau ' + payload.levelId, 'error');
                    }
                });

                function updateNextLevelButton() {
                    const btn = document.getElementById('next-level-button');
                    const completed = currentLevelId <= playerLastCompletedLevel;
                    const hasNext = levelsIds.indexOf(currentLevelId + 1) !== -1;
                    btn.classList.toggle('visible', completed && hasNext);
                }

                document.getElementById('next-level-button').addEventListener('click', async function() {
                    if (!this.classList.contains('visible')) return;
                    await loadLevel(currentLevelId + 1, token);
                });

                document.getElementById("run-button").addEventListener("click", async function() {
                    if (this.classList.contains('disabled')) return;
                    var code = editor.getValue();
                    var levelId = currentLevelId;

                    setActionButtonsDisabled(true);
                    try {
                        try {
                            let response = await fetch('/precheck', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': 'Bearer ' + token
                                },
                                body: JSON.stringify({ levelId, code }),
                                credentials: 'include'
                            });
                            let outcome = await response.json();
                            if (outcome.timeout) {
                                showNotification('Exécution bloquée : ' + outcome.error + ' Corrige tes boucles avant de relancer.', 'error');
                                return;
                            }
                        } catch (err) {
                            console.error('Pré-check serveur indisponible :', err);
                            showNotification('Pré-check serveur indisponible — exécution locale uniquement (à tes risques).', 'error');
                        }

                        try {
                            solve(code);
                        } catch (e) {
                            console.error(e);
                            showNotification('Erreur lors de l\'exécution du script : ' + e.message, 'error');
                        }
                    } finally {
                        setActionButtonsDisabled(false);
                    }
                });

                document.getElementById("submit-button").addEventListener("click", async function() {
                    if (this.classList.contains('disabled')) return;
                    var code = editor.getValue();
                    var levelId = currentLevelId;

                    setActionButtonsDisabled(true);
                    try {
                        let response = await fetch('/checkanswer', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + token
                            },
                            body: JSON.stringify({ levelId, code }),
                            credentials: 'include'
                        });

                        let result = await response.json();

                        if (result === true) {
                            showNotification('Bravo, la solution est valide ! Évaluation IA en cours…', 'success');
                            if (levelId > playerLastCompletedLevel) {
                                playerLastCompletedLevel = levelId;
                            }
                            await fetchLevels();
                            updateNextLevelButton();
                            displayFeedback('pending', null);
                        } else {
                            showNotification('La solution n\'est pas valide, persévère !', 'error');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        showNotification('Erreur lors de la soumission du code : ' + error.message, 'error');
                    } finally {
                        setActionButtonsDisabled(false);
                    }
                });

                var levelsIds = [];
                async function fetchLevels() {
                    try {
                        let response = await fetch('/levels', {
                            headers: { 'Authorization': 'Bearer ' + token },
                            credentials: 'include'
                        });
                        if (!response.ok) throw new Error('Network response was not ok');
                        levelsIds = await response.json();
                        displayLevels(levelsIds);
                    } catch (error) {
                        console.error('Error fetching levels:', error);
                        showNotification('Erreur lors de la récupération des niveaux : ' + error.message, 'error');
                    }
                }

                function displayLevels(levels) {
                    const levelList = document.getElementById('level-list');
                    levelList.innerHTML = '';
                    levels.forEach(levelId => {
                        const li = document.createElement('li');
                        li.textContent = `Niveau ${levelId}`;
                        li.setAttribute('data-level-id', levelId);
                        li.addEventListener('click', () => loadLevel(levelId, token));
                        levelList.appendChild(li);
                    });
                    highlightCurrentLevel(currentLevelId);
                }

                async function fetchPlayerProgress() {
                    try {
                        let response = await fetch('/user/progress', {
                            headers: { 'Authorization': 'Bearer ' + token },
                            credentials: 'include'
                        });
                        if (!response.ok) throw new Error('Network response was not ok');
                        let progress = await response.json();
                        playerLastCompletedLevel = progress.progress;
                        if (levelsIds[levelsIds.length - 1] >= progress.progress + 1)
                            await loadLevel(progress.progress + 1, token);
                        else
                            await loadLevel(levelsIds[levelsIds.length - 1], token);
                    } catch (error) {
                        console.error('Error fetching levels:', error);
                        showNotification('Erreur lors du chargement de votre progression : ' + error.message, 'error');
                    }
                }

                async function loadPlayerSentence(levelId, token) {
                    try {
                        let response = await fetch(`/level/${levelId}/usersolution`, {
                            headers: { 'Authorization': 'Bearer ' + token },
                            credentials: 'include'
                        });
                        if (!response.ok) throw new Error('Network response was not ok');
                        let data = await response.text();
                        editor.setValue(data);
                    } catch (error) {
                        console.error('Error loading level:', error);
                        showNotification('Erreur lors de la récupération du niveau : ' + error.message, 'error');
                    }
                }

                async function loadLevel(levelId, token) {
                    document.getElementById('next-level-button').classList.remove('visible');
                    displayFeedback(null, null);
                    try {
                        let response = await fetch(`/level/${levelId}`, {
                            headers: { 'Authorization': 'Bearer ' + token },
                            credentials: 'include'
                        });
                        if (!response.ok) throw new Error('Network response was not ok');
                        let data = await response.json();
                        await loadPlayerSentence(levelId, token);
                        initializeGame(data);
                        currentLevelId = levelId;
                        highlightCurrentLevel(levelId);
                        updateNextLevelButton();

                        const feedback = await fetchFeedback(levelId);
                        if (feedback && feedback.status) {
                            displayFeedback(feedback.status, feedback.result);
                        }
                    } catch (error) {
                        console.error('Error loading level:', error);
                        showNotification('Erreur lors de la récupération du niveau : ' + error.message, 'error');
                    }
                }

                await fetchLevels();
                await fetchPlayerProgress();
            });
        </script>

    </body>
</html>
